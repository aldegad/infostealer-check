name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: bash tests/run-tests.sh
      - name: Syntax check all modules
        run: |
          fail=0
          for f in modules/**/*.sh core/*.sh; do
            bash -n "$f" || { echo "FAIL: $f"; fail=1; }
          done
          exit $fail
      - name: Validate JSON configs
        run: |
          for f in signatures/*.json config/*.json config/i18n/*.json; do
            jq empty "$f" || exit 1
          done
  windows-powershell-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse Windows script in Windows PowerShell
        shell: powershell
        run: |
          $scriptPaths = @(
            (Resolve-Path .\check-windows.ps1).Path
            (Resolve-Path .\core\runner.ps1).Path
          )

          $scriptPaths += Get-ChildItem .\modules -Recurse -Filter *.ps1 | ForEach-Object {
            $_.FullName
          }

          foreach ($scriptPath in $scriptPaths) {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $scriptPath,
              [ref] $tokens,
              [ref] $errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Error ("{0}:{1}:{2} {3}" -f $scriptPath, $_.Extent.StartLineNumber, $_.Extent.StartColumnNumber, $_.Message)
              }
              exit 1
            }
          }
      - name: Run Windows runtime smoke tests
        shell: powershell
        run: .\tests\run-windows-tests.ps1
